server:
  # Restrict CORS to specific origins. Default ("*") allows any origin.
  # To lock down, list allowed origins explicitly, e.g.:
  #   cors_origins:
  #     - "http://localhost:8000"
  #     - "chrome-extension://YOUR_EXTENSION_ID"
  cors_origins:
    - "*"

feeds:
  refresh_interval_minutes: 60

ingestion:
  bulk_rate_limit: 1.0
  classifier_body_words: 400
  max_content_length: 10000000
  request_timeout: 30
  user_agent: Mozilla/5.0 (compatible; bRAInZ/0.1)

llm:
  # Active provider. Override with LLM_PROVIDER env var.
  provider: ollama

  ollama:
    base_url: http://host.docker.internal:11434
    classification_model: gemma3:12b
    vision_model: gemma3:12b
    classify_timeout: 120
    embed_timeout: 120
    embedding_dimensions: 1024
    embedding_model: mxbai-embed-large:latest
    embed_max_chars: 800
    query_model: gemma4:26b
    query_timeout: 300
    query_num_ctx: 32768
    query_temperature: 0.1
    query_think: true

  anthropic:
    classification_model: claude-haiku-4-5-20251001
    vision_model: claude-haiku-4-5-20251001
    query_model: claude-sonnet-4-6
    embedding_model: voyage-3
    embedding_dimensions: 1024

  google:
    # api_key read from GOOGLE_AI_API_KEY env var
    classification_model: gemini-2.0-flash
    query_model: gemini-2.5-pro
    embedding_model: gemini-embedding-001
    embedding_dimensions: 768

  # openai_compatible covers any OpenAI-compatible API via the `preset` key.
  # Built-in presets and their env var for the API key:
  #   openai       → OPENAI_API_KEY        (api.openai.com)
  #   mistral      → MISTRAL_API_KEY       (api.mistral.ai)
  #   ollama_cloud → OLLAMA_CLOUD_API_KEY  (ollama.com — embeddings fall back to embed_base_url)
  # Omit preset (or set preset: openai_compatible) for a fully custom endpoint;
  # set base_url and api_key manually in that case.
  # Any field listed here overrides the preset default.
  openai_compatible:
    preset: openai
    # base_url: https://api.openai.com/v1   # override to point at any compatible API
    # api_key: ...                           # fallback if env var is unset
    # classification_model: gpt-4o-mini
    # query_model: gpt-4o
    # embedding_model: text-embedding-3-small
    # embedding_dimensions: 1536

rag:
  chunk_size: 400
  chunk_overlap: 50
  default_top_k: 10
  query_top_k: 8
  skill_top_chunks: 50
  reranker: flashrank
  reranker_top_k: 5

tools:
  refresh_interval_minutes: 1440
