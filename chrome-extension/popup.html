<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      width: 320px;
      min-height: 160px;
    }
    .header {
      background: #13132b;
      border-bottom: 1px solid #222244;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      color: #e94560;
      letter-spacing: .05em;
    }
    .settings-btn {
      background: none;
      border: none;
      color: #8888aa;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 3px;
    }
    .settings-btn:hover { color: #e8e8f0; background: #1a1a3a; }
    .body { padding: 14px 16px; }
    .url-display {
      font-size: 11px;
      color: #8888aa;
      background: #13132b;
      border: 1px solid #222244;
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row { display: flex; gap: 8px; margin-bottom: 10px; }
    select, input {
      flex: 1;
      background: #1a1a3a;
      border: 1px solid #2a2a50;
      border-radius: 4px;
      color: #e8e8f0;
      font-size: 12px;
      padding: 6px 8px;
      outline: none;
    }
    select:focus, input:focus { border-color: #e94560; }
    input::placeholder { color: #444466; }
    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #c73652; }
    .btn:disabled { background: #444466; cursor: not-allowed; }
    .btn.secondary { background: #2a2a50; font-size: 12px; }
    .btn.secondary:hover { background: #3a3a66; }
    .divider { border: none; border-top: 1px solid #222244; margin: 10px 0; }
    .snapshot-row { display: flex; gap: 8px; }
    .btn.snapshot { background: #1a3a5c; font-size: 12px; flex: 1; }
    .btn.snapshot:hover { background: #1e4a78; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      border-radius: 4px;
      padding: 4px 8px;
    }
    .status.ok  { color: #4caf50; }
    .status.err { color: #e94560; }
    .status.info { color: #8888aa; }
    .not-configured {
      padding: 20px 16px;
      text-align: center;
      font-size: 12px;
      color: #8888aa;
    }
    .not-configured a { color: #e94560; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">bRAInZ</span>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
  </div>

  <div id="notConfigured" class="not-configured" style="display:none">
    Not configured. <a id="openSettings">Open settings</a> to set your API URL and key.
  </div>

  <div id="mainBody" class="body" style="display:none">
    <div class="url-display" id="urlDisplay">Loading...</div>
    <div class="row">
      <select id="categorySelect">
        <option value="">Auto category</option>
      </select>
    </div>
    <div class="row">
      <input type="text" id="tagsInput" placeholder="Tags (comma separated, optional)">
    </div>
    <div class="btn-row">
      <button class="btn" id="ingestBtn">Save</button>
      <button class="btn secondary" id="ingestFollowupBtn">🔖 Save + Followup</button>
    </div>
    <hr class="divider">
    <div class="snapshot-row">
      <button class="btn snapshot" id="snapshotBtn" title="Capture page locally and send to bRAInZ — bypasses site blocks">📸 Save with Snapshot</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
