<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      padding: 32px;
      max-width: 480px;
    }
    h1 {
      font-size: 20px;
      font-weight: 800;
      color: #e94560;
      letter-spacing: .05em;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #8888aa;
      margin-bottom: 6px;
      margin-top: 16px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    input {
      width: 100%;
      background: #1a1a3a;
      border: 1px solid #2a2a50;
      border-radius: 4px;
      color: #e8e8f0;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
    }
    input:focus { border-color: #e94560; }
    input::placeholder { color: #444466; }
    .hint {
      font-size: 11px;
      color: #555577;
      margin-top: 4px;
    }
    .btn {
      margin-top: 24px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #c73652; }
    .status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 18px;
    }
    .status.ok  { color: #4caf50; }
    .status.err { color: #e94560; }
  </style>
</head>
<body>
  <h1>bRAInZ Settings</h1>

  <label for="apiUrl">API URL</label>
  <input type="url" id="apiUrl" placeholder="http://localhost:8000">
  <div class="hint">Base URL of your bRAInZ backend (no trailing slash)</div>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="Leave blank if no auth configured">
  <div class="hint">Value of api_key in your config.yaml (optional)</div>

  <button class="btn" id="saveBtn">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
