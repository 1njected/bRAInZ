services:
  brainz:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
      - ./backend:/app
      - ./frontend:/frontend
    environment:
      - API_KEYS=${API_KEYS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DATA_DIR=/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
