<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bRAInZ — Options</title>
  <style>
    :root {
      --bg: #1a1a2e; --bg2: #16213e; --accent: #0f3460;
      --highlight: #e94560; --text: #eaeaea; --text-dim: #9a9ab0;
      --border: #2a2a4a; --success: #4caf50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 480px; margin: 40px auto; padding: 0 20px;
    }
    h1 { color: var(--highlight); margin-bottom: 24px; font-size: 22px; }
    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
    }
    input, select {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 14px; padding: 9px 12px; outline: none;
    }
    input:focus, select:focus { border-color: var(--highlight); }
    .row { display: flex; gap: 10px; }
    button {
      background: var(--highlight); color: white; border: none; border-radius: 4px;
      padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button.secondary { background: var(--accent); }
    button:hover { opacity: 0.88; }
    #status { margin-top: 14px; font-size: 13px; min-height: 20px; }
    .ok { color: var(--success); } .err { color: var(--highlight); }
  </style>
</head>
<body>
  <h1>bRAInZ Settings</h1>

  <div class="field">
    <label>API URL</label>
    <input type="url" id="apiUrl" placeholder="http://localhost:8000">
  </div>

  <div class="field">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Your API key">
  </div>

  <div class="field">
    <label>Default Category</label>
    <select id="defaultCategory">
      <option value="">Auto-classify</option>
    </select>
  </div>

  <div class="row">
    <button id="saveBtn">Save</button>
    <button id="testBtn" class="secondary">Test Connection</button>
  </div>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
